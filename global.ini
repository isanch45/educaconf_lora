; --- CONFIGURACIÓ GLOBAL PER A TOTES LES PLAQUES ---
[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_src_filter = 
  +<*> 
  -<backup/>

; Llibreries compartides que es descarregaran automàticament
lib_deps =
    ; La ràdio LoRa (versió 7.5.x com has demanat)
    jgromes/RadioLib @ 7.5.0
    
    ; OLED SSD1306 per pantalla 0.96"
    adafruit/Adafruit SSD1306 @ ^2.5.7
    adafruit/Adafruit GFX Library @ ^1.11.9
    
    ; JSON i Sensor DHT22
    bblanchon/ArduinoJson @ ^7.0.0
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    
    ; Nota: SPI.h, SD.h i FS.h ja estan integrades al paquet 'arduino' de l'ESP32, 
    ; per tant no cal afegir-les aquí.